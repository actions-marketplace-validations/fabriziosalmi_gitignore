name: 'occam-gitignore'
description: 'Deterministic .gitignore generation, drift checking, and auto-fix.'
author: 'Fabrizio Salmi'
branding:
  icon: 'shield'
  color: 'gray-dark'

inputs:
  path:
    description: 'Repository path to scan (default: workspace root).'
    required: false
    default: '.'
  mode:
    description: 'Operation mode: "check" fails on drift; "fix" rewrites .gitignore in place.'
    required: false
    default: 'check'
  python-version:
    description: 'Python version used to install the CLI.'
    required: false
    default: '3.12'
  version:
    description: 'PEP 440 specifier for the occam-gitignore package (e.g. ">=0.1.3,<0.2").'
    required: false
    default: '>=0.1.3,<0.2'

outputs:
  drift:
    description: '"true" if the existing .gitignore differs from the deterministic output, "false" otherwise.'
    value: ${{ steps.check.outputs.drift }}
  output-hash:
    description: 'sha256:<digest> of the deterministic .gitignore content.'
    value: ${{ steps.check.outputs.output-hash }}

runs:
  using: 'composite'
  steps:
    - name: Validate inputs
      shell: bash
      env:
        OCCAM_PATH: ${{ inputs.path }}
        OCCAM_MODE: ${{ inputs.mode }}
      run: |
        set -euo pipefail
        case "${OCCAM_MODE}" in
          check|fix) ;;
          *)
            echo "::error title=occam-gitignore::invalid mode '${OCCAM_MODE}' (expected: check|fix)"
            exit 2
            ;;
        esac
        if [[ ! -d "${OCCAM_PATH}" ]]; then
          echo "::error title=occam-gitignore::path '${OCCAM_PATH}' is not a directory"
          exit 2
        fi

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install occam-gitignore
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        python -m pip install "occam-gitignore${{ inputs.version }}"

    - name: Check / fix .gitignore
      id: check
      shell: bash
      env:
        OCCAM_PATH: ${{ inputs.path }}
        OCCAM_MODE: ${{ inputs.mode }}
      run: |
        set -euo pipefail
        target_dir="${OCCAM_PATH}"
        gi="${target_dir%/}/.gitignore"
        tmp="$(mktemp)"
        trap 'rm -f "${tmp}"' EXIT
        occam-gitignore generate "${target_dir}" > "${tmp}"

        # Compute output hash (cross-platform: prefer sha256sum, fall back to shasum).
        if command -v sha256sum >/dev/null 2>&1; then
          digest="sha256:$(sha256sum "${tmp}" | awk '{print $1}')"
        else
          digest="sha256:$(shasum -a 256 "${tmp}" | awk '{print $1}')"
        fi
        echo "output-hash=${digest}" >> "${GITHUB_OUTPUT}"

        if [[ -f "${gi}" ]] && diff -q "${gi}" "${tmp}" >/dev/null 2>&1; then
          echo "drift=false" >> "${GITHUB_OUTPUT}"
          echo "::notice title=occam-gitignore::no drift detected (${digest})"
          exit 0
        fi

        echo "drift=true" >> "${GITHUB_OUTPUT}"

        if [[ "${OCCAM_MODE}" == "check" ]]; then
          echo "::error title=occam-gitignore::drift detected in ${gi}"
          if [[ -f "${gi}" ]]; then
            echo "----- diff (current → deterministic) -----"
            diff -u "${gi}" "${tmp}" || true
          else
            echo "----- proposed .gitignore -----"
            cat "${tmp}"
          fi
          exit 1
        fi

        # mode=fix
        mv "${tmp}" "${gi}"
        trap - EXIT
        echo "::notice title=occam-gitignore::wrote ${gi} (${digest})"
